<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Region Editor</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="data/custom-regions.js"></script>

<style>

html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#132235;
    color:white;
    font-family:Arial,sans-serif;
}

#toolbar{
    height:56px;
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 16px;
    background:#0f172a;
    border-bottom:1px solid #334155;
}

button,select{
    padding:8px 12px;
    font-size:15px;
    background:#132235;
    color:white;
    border:1px solid #475569;
}

button{
    cursor:pointer;
}

#map{
    width:100vw;
    height:calc(100vh - 56px);
}

.country{
    fill:#707070;
    stroke:#111;
    stroke-width:.6;
    cursor:pointer;
}

.country.selected{
    fill:#3b82f6;
}

.country:hover{
    fill:#60a5fa;
}

#hoverLabel{
    position:absolute;
    left:16px;
    bottom:16px;
    padding:8px 12px;
    background:rgba(15,23,42,.95);
    border:1px solid #475569;
    pointer-events:none;
    font-size:15px;
}

</style>

</head>

<body>

<div id="toolbar">

<label>Region</label>

<select id="regionSelect"></select>

<button id="newRegion">
New Region
</button>

<button id="export">
Export
</button>

</div>

<div id="hoverLabel">
Hover over a country
</div>

<svg id="map"></svg>

<script>

const svg=d3.select("#map");

const width=window.innerWidth;
const height=window.innerHeight-56;

const projection=d3.geoNaturalEarth1();

const path=d3.geoPath(projection);

const g=svg.append("g");

let world;

function populateRegions(){

    const select=document.getElementById("regionSelect");

    select.innerHTML="";

    Object.keys(CUSTOM_REGIONS)
        .sort()
        .forEach(region=>{

            const option=document.createElement("option");

            option.value=region;
            option.textContent=region;

            select.appendChild(option);

        });

}

function currentRegion(){

    return document.getElementById("regionSelect").value;

}

function redraw(){

    const ids=new Set(
        CUSTOM_REGIONS[currentRegion()]
    );

    g.selectAll("path")

        .classed("selected",d=>ids.has(d.id));

}

async function init(){

    populateRegions();

    world=await d3.json("data/world.geojson");

    projection.fitExtent(
        [
            [20,20],
            [width-20,height-20]
        ],
        world
    );

    g.selectAll("path")
        .data(world.features)
        .join("path")
        .attr("class","country")
        .attr("d",path)

        .on("mouseenter",(event,d)=>{

            document
                .getElementById("hoverLabel")
                .textContent=d.properties.name;

        })

        .on("click",(event,d)=>{

            const list=
                CUSTOM_REGIONS[currentRegion()];

            const index=
                list.indexOf(d.id);

            if(index===-1){

                list.push(d.id);

            }else{

                list.splice(index,1);

            }

            redraw();

        });

    redraw();

}

document
.getElementById("regionSelect")
.addEventListener("change",redraw);

document
.getElementById("newRegion")
.addEventListener("click",()=>{

    const name=prompt("Region name");

    if(!name)return;

    const key=name
        .toLowerCase()
        .replace(/\s+/g,"-");

    if(CUSTOM_REGIONS[key]){

        alert("That region already exists.");

        return;

    }

    CUSTOM_REGIONS[key]=[];

    populateRegions();

    document
        .getElementById("regionSelect")
        .value=key;

    redraw();

});

document
.getElementById("export")
.addEventListener("click",()=>{

    const text=
        "const CUSTOM_REGIONS = "
        + JSON.stringify(CUSTOM_REGIONS, null, 4)
        + ";";

    const blob = new Blob([text], {
        type: "text/javascript"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "custom-regions.js";

    a.click();

    URL.revokeObjectURL(url);

});

const zoom = d3.zoom()

    .scaleExtent([1,8])

    .on("zoom",(event)=>{

        g.attr(
            "transform",
            event.transform
        );

    });

svg.call(zoom);

init();

</script>

</body>
</html>
