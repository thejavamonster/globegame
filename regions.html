<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Region Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<script src="data/custom-regions.js"></script>

<style>
body{
    margin:0;
    background:#132235;
    color:white;
    font-family:Arial,sans-serif;
}

.controls{
    padding:16px;
    display:flex;
    gap:12px;
    align-items:center;
}

select{
    padding:8px;
    font-size:16px;
}

svg{
    width:100vw;
    height:calc(100vh - 70px);
}

.country{
    fill:#666;
    stroke:#111;
    stroke-width:.5;
}

.selected{
    fill:#3b82f6;
}

text{
    fill:white;
}
</style>
</head>

<body>

<div class="controls">

<label>Region:</label>

<select id="regionSelect">
<option value="north-america">North America</option>
<option value="south-america">South America</option>
<option value="europe">Europe</option>
<option value="africa">Africa</option>
<option value="asia">Asia</option>
<option value="oceania">Oceania</option>

<option value="middle-east">Middle East</option>
<option value="subsaharan-africa">Sub-Saharan Africa</option>
<option value="western-europe">Western Europe</option>
<option value="eastern-europe">Eastern Europe</option>
<option value="southern-asia">Southern Asia</option>
</select>

</div>

<svg id="map"></svg>

<script>

const width = window.innerWidth;
const height = window.innerHeight-70;

const svg=d3.select("#map");

const projection=d3.geoNaturalEarth1()
    .fitExtent([[20,20],[width-20,height-20]],{type:"Sphere"});

const path=d3.geoPath(projection);

async function init(){

    const world=await d3.json("data/world.geojson");

    svg.selectAll("path")
        .data(world.features)
        .join("path")
        .attr("class","country")
        .attr("d",path);

    update();

}

function update(){

    const region=document.getElementById("regionSelect").value;

    const ids=new Set(CUSTOM_REGIONS[region]);

    svg.selectAll("path")
        .classed("selected",d=>ids.has(d.id));

}

document
.getElementById("regionSelect")
.addEventListener("change",update);

init();

</script>

</body>
</html>
